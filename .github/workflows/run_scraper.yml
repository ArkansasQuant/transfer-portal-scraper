name: Run Transfer Portal Scraper
on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test Mode (true = 50 players, false = full scrape)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      validation_sample:
        description: 'Number of players to validate for accuracy'
        required: false
        default: '20'
        type: choice
        options:
          - '10'
          - '20'
          - '50'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 Hours allowed for 1,500+ players
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        playwright install chromium
        playwright install-deps
    
    - name: Run Scraper
      run: python scraper.py
      env:
        TEST_MODE: ${{ github.event.inputs.test_mode }}
    
    - name: Validate Accuracy
      run: python validate_accuracy.py TEST_*.csv ${{ github.event.inputs.validation_sample }}
      if: always()
    
    - name: Upload CSV Data
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: CSV_Output
        path: |
          *.csv
        retention-days: 90
    
    - name: Upload Debug HTML Files
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Debug_HTML_Files
        path: |
          debug_html/*.html
        retention-days: 7
